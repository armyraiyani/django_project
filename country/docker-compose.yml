services:
  web:
    build: .
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DB_NAME=country_db
      - DB_USER=postgres
      - DB_PASSWORD=root
      - DB_HOST=host.docker.internal
      - DB_PORT=5432